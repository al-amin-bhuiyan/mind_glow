name: mind_glow
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  get: ^4.6.6
  flutter_screenutil: ^5.9.0
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10
  socket_io_client: ^2.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_spinkit: ^5.2.0
  fluttertoast: ^8.2.4
  permission_handler: ^11.3.1
  device_preview: ^1.1.0
  wave_blob: ^1.0.5
  siri_wave: ^2.3.0
  animated_text_kit: ^4.2.2
  http: ^1.2.0
  toastification: ^3.0.3
  lottie: ^3.3.2

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  image: ^4.5.4



flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_native_splash:
  android: true
  ios: true
  web: false

  # Fallback color: if a platform/version can't use the background image,
  # this solid color will be used instead.
  color: "#FFF6DB"

  background_image: "assets/images/splash_background.png"
  image: "assets/images/splash_logo.png"

  android_12:
    # Android 12 uses the system splash API. It can't render an arbitrary
    # full-screen background image reliably, so we use the fallback color.
    color: "#FFF6DB"
    image: "assets/images/splash_logo.png"

  fullscreen: true
  android_gravity: center
  ios_content_mode: center
